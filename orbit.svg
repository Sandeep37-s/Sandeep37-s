<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#6a11cb"/>
    </radialGradient>
    <style>
      text { font-family: 'Segoe UI', 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <rect width="480" height="480" rx="20" fill="#0d1117"/>
  <rect x="1" y="1" width="478" height="478" rx="19" fill="none" stroke="#21262d" stroke-width="2"/>

  <text x="240" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">🌐 Currently Exploring</text>

  <circle cx="240" cy="250" r="120" fill="none" stroke="#21262d" stroke-width="1.5" stroke-dasharray="3 5"/>

  <circle cx="240" cy="250" r="52" fill="url(#coreGrad)">
    <animate attributeName="r" values="52;56;52" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="240" y="255" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">AI</text>

  <!-- 6 orbiting nodes, hexagon start positions around (240,250) r=120, synced 18s rotation -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 240 250" to="360 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="360" cy="250" r="27" fill="#161b22" stroke="#00d4ff" stroke-width="2"/>
    <text x="360" y="255" text-anchor="middle" font-size="11" fill="#e6e6e6">ML</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="60 240 250" to="420 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="300" cy="353.9" r="27" fill="#161b22" stroke="#2575fc" stroke-width="2"/>
    <text x="300" y="358.9" text-anchor="middle" font-size="10.5" fill="#e6e6e6">GenAI</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 240 250" to="480 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="180" cy="353.9" r="27" fill="#161b22" stroke="#6a11cb" stroke-width="2"/>
    <text x="180" y="358.9" text-anchor="middle" font-size="11" fill="#e6e6e6">DL</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="180 240 250" to="540 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="120" cy="250" r="27" fill="#161b22" stroke="#00d4ff" stroke-width="2"/>
    <text x="120" y="255" text-anchor="middle" font-size="11" fill="#e6e6e6">CV</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 240 250" to="600 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="180" cy="146.1" r="27" fill="#161b22" stroke="#2575fc" stroke-width="2"/>
    <text x="180" y="151.1" text-anchor="middle" font-size="11" fill="#e6e6e6">NLP</text>
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="300 240 250" to="660 240 250" dur="18s" repeatCount="indefinite"/>
    <circle cx="300" cy="146.1" r="27" fill="#161b22" stroke="#6a11cb" stroke-width="2"/>
    <text x="300" y="150.1" text-anchor="middle" font-size="10" fill="#e6e6e6">MLOps</text>
  </g>

  <text x="240" y="455" text-anchor="middle" font-size="12" fill="#8b949e">LLM Engineering • Agentic AI • Cloud Deployment</text>
</svg>
